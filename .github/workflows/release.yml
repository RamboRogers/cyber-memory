name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Supported build targets:
#   darwin/arm64  — native macos-14 runner
#   linux/amd64   — native ubuntu-22.04 runner
#
# Not yet supported:
#   darwin/amd64  — ORT dropped Intel Mac builds after v1.23.2; cross-compile linker issues
#   linux/arm64   — cross-compile libtokenizers issues with aarch64-linux-gnu toolchain
#   windows       — ortgenai dep requires dlfcn.h (POSIX-only, no Windows equivalent)

jobs:
  build-darwin-arm64:
    name: Build darwin-arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache libtokenizers
        id: cache-tok
        uses: actions/cache@v4
        with:
          path: ~/.local/lib/libtokenizers.a
          key: tokenizers-darwin-arm64-${{ hashFiles('go.sum') }}

      - name: Build libtokenizers
        if: steps.cache-tok.outputs.cache-hit != 'true'
        run: |
          TMPDIR=$(mktemp -d)
          git clone --depth 1 https://github.com/daulet/tokenizers.git "$TMPDIR"
          cd "$TMPDIR"
          cargo build --release
          mkdir -p ~/.local/lib
          cp target/release/libtokenizers_ffi.a ~/.local/lib/libtokenizers.a

      - name: Fetch ORT
        run: |
          curl -fsSL -o /tmp/ort.tgz \
            https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-osx-arm64-1.24.4.tgz
          tar xf /tmp/ort.tgz -C /tmp
          mkdir -p assets/darwin_arm64
          cp /tmp/onnxruntime-osx-arm64-1.24.4/lib/libonnxruntime.dylib assets/darwin_arm64/

      - name: Build
        run: |
          export CGO_ENABLED=1
          export CGO_LDFLAGS="-L$HOME/.local/lib -ltokenizers"
          go build -tags ORT \
            -ldflags "-X github.com/ramborogers/cyber-memory/internal/appinfo.Version='${{ github.ref_name }}'" \
            -o cyber-memory-darwin-arm64 .

      - uses: actions/upload-artifact@v4
        with:
          name: cyber-memory-darwin-arm64
          path: cyber-memory-darwin-arm64
          if-no-files-found: error

  build-linux-amd64:
    name: Build linux-amd64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache libtokenizers
        id: cache-tok
        uses: actions/cache@v4
        with:
          path: ~/.local/lib/libtokenizers.a
          key: tokenizers-linux-amd64-${{ hashFiles('go.sum') }}

      - name: Build libtokenizers
        if: steps.cache-tok.outputs.cache-hit != 'true'
        run: |
          TMPDIR=$(mktemp -d)
          git clone --depth 1 https://github.com/daulet/tokenizers.git "$TMPDIR"
          cd "$TMPDIR"
          cargo build --release
          mkdir -p ~/.local/lib
          cp target/release/libtokenizers_ffi.a ~/.local/lib/libtokenizers.a

      - name: Fetch ORT
        run: |
          curl -fsSL -o /tmp/ort.tgz \
            https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-x64-1.24.4.tgz
          tar xf /tmp/ort.tgz -C /tmp
          mkdir -p assets/linux_amd64
          cp /tmp/onnxruntime-linux-x64-1.24.4/lib/libonnxruntime.so.1.24.4 assets/linux_amd64/libonnxruntime.so

      - name: Build
        run: |
          export CGO_ENABLED=1
          export CGO_LDFLAGS="-L$HOME/.local/lib -ltokenizers -ldl -lm -lstdc++"
          go build -tags ORT \
            -ldflags "-X github.com/ramborogers/cyber-memory/internal/appinfo.Version='${{ github.ref_name }}'" \
            -o cyber-memory-linux-amd64 .

      - uses: actions/upload-artifact@v4
        with:
          name: cyber-memory-linux-amd64
          path: cyber-memory-linux-amd64
          if-no-files-found: error

  release:
    name: Create Release
    needs:
      - build-darwin-arm64
      - build-linux-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt && cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/cyber-memory-darwin-arm64
            dist/cyber-memory-linux-amd64
            dist/checksums.txt
